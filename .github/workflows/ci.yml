name: CI

# Run on every push and on every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest

    steps:
      # Pull the repository onto the fresh CI machine.
      - name: Check out code
        uses: actions/checkout@v4

      # Install Node 20 and cache npm downloads between runs for speed.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Clean, reproducible install from package-lock.json. This also runs the
      # `postinstall` script, which generates the Prisma client (reads
      # schema.prisma only — no database connection needed).
      - name: Install dependencies
        run: npm ci

      # Preserve Turbopack's compilation cache between CI runs. setup-node
      # already caches npm downloads; this covers Next.js build work.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('app/**/*', 'public/**/*', 'prisma/**/*', 'next.config.*', 'tsconfig.json', 'postcss.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Lint
        run: npm run lint

      # Type-check without emitting output: fails on any TypeScript error.
      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      # These values satisfy configuration validation only. `next build`
      # compiles the app but does not connect to Postgres or call provider APIs.
      - name: Build production application
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          BETTER_AUTH_SECRET: ci-only-secret-not-for-runtime-000000000000
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_MAPS_API_KEY: ci-placeholder
          NEXT_PUBLIC_MAPS_API_KEY: ci-placeholder
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          NEXT_TELEMETRY_DISABLED: 1
